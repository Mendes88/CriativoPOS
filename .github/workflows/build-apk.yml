name: Build Criativo POS APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-x
      - name: Permissoes gradlew
        run: chmod +x CriativoPOS/gradlew
      - name: Build APK
        working-directory: CriativoPOS
        run: ./gradlew assembleRelease --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: CriativoPOS-APK
          path: CriativoPOS/app/build/outputs/apk/release/*.apk
          retention-days: 30
