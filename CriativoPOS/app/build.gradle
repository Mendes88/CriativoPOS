plugins {
    id 'com.android.application'
}

android {
    compileSdk 33

    defaultConfig {
        applicationId "pt.criativo.pos"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "2.3"
    }

    buildTypes {
        release { minifyEnabled false }
        debug   { debuggable true }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    namespace 'pt.criativo.pos'
}

dependencies {
}
